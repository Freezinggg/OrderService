version: "3.9"

services:
    postgres:
        image: postgres:18
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: order
        ports:
          - "5432:5432"
    orderservice-api-1:
        build:
          context: .
        ports:
          - "8080:8080"
        environment:
            INSTANCE_NAME: api-1
            REDIS_CONNECTION: redis:6379
            ASPNETCORE_ENVIRONMENT: Docker
    orderservice-api-2:
        build:
          context: .
        ports:
          - "8081:8080"
        environment:
            INSTANCE_NAME: api-2
            REDIS_CONNECTION: redis:6379
            ASPNETCORE_ENVIRONMENT: Docker
    nginx:
        image: nginx:latest
        ports:
            - "8088:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
    redis:
      image: redis:7
      ports:
        - "6379:6379"